<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Digital Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls input,
        .controls button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .controls input {
            background: white;
            width: 250px;
            padding: 12px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .controls button {
            background: #ff6b6b;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .controls button:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .clock-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }

        .clock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .timezone-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .digital-clock {
            font-size: 3.5em;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #667eea;
            margin: 20px 0;
            letter-spacing: 3px;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.2);
        }

        .date-display {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 15px;
        }

        .day-display {
            font-size: 1em;
            color: #999;
            margin-bottom: 10px;
        }

        .utc-offset {
            font-size: 0.95em;
            color: #764ba2;
            font-weight: 600;
        }

        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff6b6b;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            opacity: 0;
        }

        .clock-card:hover .remove-btn {
            opacity: 1;
        }

        .remove-btn:hover {
            background: #ff5252;
            transform: scale(1.1);
        }

        .analog-clock {
            width: 150px;
            height: 150px;
            margin: 15px auto;
            position: relative;
            background: #f8f9fa;
            border-radius: 50%;
            border: 3px solid #667eea;
            box-shadow: inset 0 0 10px rgba(102, 126, 234, 0.1);
        }

        .clock-center {
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .clock-hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
        }

        .hour-hand {
            width: 6px;
            height: 40px;
            background: #667eea;
            margin-left: -3px;
        }

        .minute-hand {
            width: 4px;
            height: 50px;
            background: #764ba2;
            margin-left: -2px;
        }

        .second-hand {
            width: 2px;
            height: 55px;
            background: #ff6b6b;
            margin-left: -1px;
        }

        .clock-number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 1em;
            font-weight: bold;
            color: #333;
        }

        .clock-number span {
            display: inline-block;
            position: absolute;
            left: 50%;
            width: 1.5em;
            margin-left: -0.75em;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state h2 {
            font-size: 1.8em;
            margin-bottom: 15px;
        }

        .empty-state p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .timezone-suggestions {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            color: white;
        }

        .timezone-suggestions h3 {
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .suggestions-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .suggestion-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95em;
        }

        .suggestion-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .digital-clock {
                font-size: 2.5em;
            }

            .controls {
                flex-direction: column;
            }

            .controls input {
                width: 100%;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }
        }

        .filter-section {
            margin-bottom: 20px;
            text-align: center;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            margin: 0 5px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .filter-btn.active {
            background: white;
            color: #667eea;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 Multi-Timezone Digital Clock</h1>
            <p>Track time across the world in real-time</p>
        </div>

        <div class="controls">
            <input 
                type="text" 
                id="tzInput" 
                placeholder="Enter timezone (e.g., America/New_York, Asia/Tokyo)..."
            >
            <button onclick="addTimezone()">Add Timezone</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" onclick="filterClocks('all')">All</button>
            <button class="filter-btn" onclick="filterClocks('digital')">Digital</button>
            <button class="filter-btn" onclick="filterClocks('analog')">Analog</button>
        </div>

        <div id="clocksContainer" class="clocks-grid"></div>

        <div class="timezone-suggestions">
            <h3>📍 Quick Add Popular Timezones:</h3>
            <div class="suggestions-list">
                <button class="suggestion-btn" onclick="addTimezoneQuick('America/New_York')">New York (EST)</button>
                <button class="suggestion-btn" onclick="addTimezoneQuick('Europe/London')">London (GMT)</button>
                <button class="suggestion-btn" onclick="addTimezoneQuick('Europe/Paris')">Paris (CET)</button>
                <button class="suggestion-btn" onclick="addTimezoneQuick('Asia/Dubai')">Dubai (GST)</button>
                <button class="suggestion-btn" onclick="addTimezoneQuick('Asia/Tokyo')">Tokyo (JST)</button>
                <button class="suggestion-btn" onclick="addTimezoneQuick('Asia/Shanghai')">Shanghai (CST)</button>
                <button class="suggestion-btn" onclick="addTimezoneQuick('Asia/Hong_Kong')">Hong Kong (HKT)</button>
                <button class="suggestion-btn" onclick="addTimezoneQuick('Asia/Singapore')">Singapore (SGT)</button>
                <button class="suggestion-btn" onclick="addTimezoneQuick('Australia/Sydney')">Sydney (AEDT)</button>
                <button class="suggestion-btn" onclick="addTimezoneQuick('Pacific/Auckland')">Auckland (NZDT)</button>
                <button class="suggestion-btn" onclick="addTimezoneQuick('America/Los_Angeles')">Los Angeles (PST)</button>
                <button class="suggestion-btn" onclick="addTimezoneQuick('America/Chicago')">Chicago (CST)</button>
            </div>
        </div>
    </div>

    <script>
        // Store timezones in localStorage
        let timezones = JSON.parse(localStorage.getItem('timezones')) || [];
        let currentFilter = 'all';

        // Initialize with a default timezone
        if (timezones.length === 0) {
            timezones = ['UTC', 'America/New_York', 'Europe/London', 'Asia/Tokyo'];
        }

        function getValidTimezones() {
            const allTimezones = [
                // Americas
                'America/Anchorage', 'America/Chicago', 'America/Denver', 'America/Los_Angeles',
                'America/Mexico_City', 'America/New_York', 'America/Toronto', 'America/Vancouver',
                'America/Argentina/Buenos_Aires', 'America/Sao_Paulo',
                // Europe
                'Europe/Amsterdam', 'Europe/Athens', 'Europe/Berlin', 'Europe/Brussels',
                'Europe/Budapest', 'Europe/Dublin', 'Europe/Helsinki', 'Europe/Istanbul',
                'Europe/London', 'Europe/Madrid', 'Europe/Moscow', 'Europe/Paris',
                'Europe/Rome', 'Europe/Stockholm', 'Europe/Vienna', 'Europe/Zurich',
                // Asia
                'Asia/Bangkok', 'Asia/Dubai', 'Asia/Hong_Kong', 'Asia/Kolkata',
                'Asia/Seoul', 'Asia/Shanghai', 'Asia/Singapore', 'Asia/Tokyo',
                'Asia/Jakarta', 'Asia/Manila', 'Asia/Bangkok',
                // Africa
                'Africa/Cairo', 'Africa/Johannesburg', 'Africa/Lagos', 'Africa/Nairobi',
                // Oceania
                'Australia/Melbourne', 'Australia/Sydney', 'Pacific/Auckland',
                // UTC
                'UTC', 'Etc/GMT'
            ];
            return allTimezones;
        }

        function isValidTimezone(tz) {
            try {
                Intl.DateTimeFormat(undefined, { timeZone: tz });
                return true;
            } catch (error) {
                return false;
            }
        }

        function addTimezone() {
            const input = document.getElementById('tzInput');
            const tz = input.value.trim();

            if (!tz) {
                alert('Please enter a timezone');
                return;
            }

            if (!isValidTimezone(tz)) {
                alert(`Invalid timezone: "${tz}". Please enter a valid timezone.`);
                return;
            }

            if (timezones.includes(tz)) {
                alert('This timezone is already added');
                return;
            }

            timezones.push(tz);
            localStorage.setItem('timezones', JSON.stringify(timezones));
            input.value = '';
            updateClocks();
        }

        function addTimezoneQuick(tz) {
            if (!timezones.includes(tz)) {
                timezones.push(tz);
                localStorage.setItem('timezones', JSON.stringify(timezones));
                updateClocks();
            }
        }

        function removeTimezone(tz) {
            timezones = timezones.filter(t => t !== tz);
            localStorage.setItem('timezones', JSON.stringify(timezones));
            updateClocks();
        }

        function filterClocks(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateClocks();
        }

        function getTimeInTimezone(tz) {
            const now = new Date();
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: tz,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });

            const parts = formatter.formatToParts(now);
            const time = {};
            parts.forEach(part => {
                time[part.type] = part.value;
            });

            return {
                hours: parseInt(time.hour),
                minutes: parseInt(time.minute),
                seconds: parseInt(time.second),
                date: new Date(now.toLocaleString('en-US', { timeZone: tz }))
            };
        }

        function getUTCOffset(tz) {
            const now = new Date();
            const utcDate = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
            const tzDate = new Date(now.toLocaleString('en-US', { timeZone: tz }));
            const diffMs = tzDate - utcDate;
            const diffHours = diffMs / 3600000;
            const sign = diffHours >= 0 ? '+' : '';
            return `UTC${sign}${diffHours.toFixed(1).replace(/\.0$/, '')}`;
        }

        function createAnalogClock(tz) {
            const { hours, minutes, seconds } = getTimeInTimezone(tz);
            const hourDeg = (hours % 12 + minutes / 60) * 30;
            const minuteDeg = (minutes + seconds / 60) * 6;
            const secondDeg = seconds * 6;

            return `
                <div class="analog-clock">
                    <div class="clock-center"></div>
                    <div class="clock-hand hour-hand" style="transform: rotate(${hourDeg}deg)"></div>
                    <div class="clock-hand minute-hand" style="transform: rotate(${minuteDeg}deg)"></div>
                    <div class="clock-hand second-hand" style="transform: rotate(${secondDeg}deg)"></div>
                    <div class="clock-number">
                        <span style="transform: rotate(0deg) translateY(-65px)">12</span>
                        <span style="transform: rotate(90deg) translateY(-65px)">3</span>
                        <span style="transform: rotate(180deg) translateY(-65px)">6</span>
                        <span style="transform: rotate(270deg) translateY(-65px)">9</span>
                    </div>
                </div>
            `;
        }

        function formatTime(hours, minutes, seconds) {
            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function getFormattedDate(date) {
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        function getDayOfWeek(date) {
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            return days[date.getDay()];
        }

        function updateClocks() {
            const container = document.getElementById('clocksContainer');

            if (timezones.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1;">
                        <div class="empty-state">
                            <h2>No Timezones Added</h2>
                            <p>Add a timezone using the input above to get started!</p>
                        </div>
                    </div>
                `;
                return;
            }

            let html = '';

            timezones.forEach(tz => {
                const { hours, minutes, seconds, date } = getTimeInTimezone(tz);
                const formattedTime = formatTime(hours, minutes, seconds);
                const formattedDate = getFormattedDate(date);
                const dayOfWeek = getDayOfWeek(date);
                const offset = getUTCOffset(tz);
                const analogClock = createAnalogClock(tz);

                if (currentFilter === 'all' || currentFilter === 'digital') {
                    html += `
                        <div class="clock-card">
                            <button class="remove-btn" onclick="removeTimezone('${tz}')">×</button>
                            <div class="timezone-name">${tz}</div>
                            <div class="digital-clock">${formattedTime}</div>
                            <div class="date-display">${formattedDate}</div>
                            <div class="day-display">${dayOfWeek}</div>
                            <div class="utc-offset">${offset}</div>
                        </div>
                    `;
                }

                if (currentFilter === 'all' || currentFilter === 'analog') {
                    html += `
                        <div class="clock-card">
                            <button class="remove-btn" onclick="removeTimezone('${tz}')">×</button>
                            <div class="timezone-name">${tz}</div>
                            ${analogClock}
                            <div class="digital-clock" style="font-size: 2em; margin: 10px 0 5px;">${formattedTime}</div>
                            <div class="date-display">${formattedDate}</div>
                            <div class="utc-offset">${offset}</div>
                        </div>
                    `;
                }
            });

            container.innerHTML = html;
        }

        // Allow Enter key to add timezone
        document.getElementById('tzInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTimezone();
            }
        });

        // Update clocks every second
        setInterval(updateClocks, 1000);

        // Initial load
        updateClocks();
    </script>
</body>
</html>
